<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="72" viewBox="0 0 1200 72" role="img" aria-label="Quick links">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <pattern id="scan" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="1" fill="#e2e8f0" opacity="0.03"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="72" fill="transparent"/>
  <rect width="1200" height="72" fill="url(#scan)"/>

  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="13" font-weight="750">
    <g transform="translate(60,14)">
      <rect width="270" height="44" rx="14" fill="#0b0f14" stroke="url(#g)" stroke-opacity="0.65" filter="url(#glow)"/>
      <text x="18" y="28" fill="#e2e8f0">Email</text>
      <text x="76" y="28" fill="#67e8f9" font-weight="650">suryanshverma.dev.official@gmail.com</text>
    </g>

    <g transform="translate(350,14)">
      <rect width="235" height="44" rx="14" fill="#0b0f14" stroke="url(#g)" stroke-opacity="0.65" filter="url(#glow)"/>
      <text x="18" y="28" fill="#e2e8f0">LinkedIn</text>
      <text x="96" y="28" fill="#67e8f9" font-weight="650">/in/suryanshverma</text>
    </g>

    <g transform="translate(605,14)">
      <rect width="235" height="44" rx="14" fill="#0b0f14" stroke="url(#g)" stroke-opacity="0.65" filter="url(#glow)"/>
      <text x="18" y="28" fill="#e2e8f0">Portfolio</text>
      <text x="92" y="28" fill="#67e8f9" font-weight="650">suryanshverma.vercel.app</text>
    </g>

    <g transform="translate(860,14)">
      <rect width="220" height="44" rx="14" fill="#0b0f14" stroke="url(#g)" stroke-opacity="0.65" filter="url(#glow)"/>
      <text x="18" y="28" fill="#e2e8f0">LeetCode</text>
      <text x="94" y="28" fill="#67e8f9" font-weight="650">@suryanshverma_1</text>
    </g>
  </g>
</svg>
