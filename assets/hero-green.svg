<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-label="Suryansh Verma hero banner">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="nebula" cx="30%" cy="20%" r="75%">
      <stop offset="0" stop-color="#22c55e" stop-opacity="0.25"/>
      <stop offset="0.45" stop-color="#06b6d4" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#070a12" stop-opacity="0"/>
    </radialGradient>
    <pattern id="scan" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="1" fill="#e6fff0" opacity="0.03"/>
    </pattern>
    <pattern id="grid" width="46" height="46" patternUnits="userSpaceOnUse">
      <path d="M46 0H0V46" fill="none" stroke="#22c55e" stroke-opacity="0.085" stroke-width="1"/>
      <circle cx="0" cy="0" r="1" fill="#06b6d4" opacity="0.12"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22c55e" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#22c55e" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="320" fill="#070a12"/>
  <rect width="1200" height="320" fill="url(#nebula)"/>
  <rect width="1200" height="320" fill="url(#grid)"/>
  <rect width="1200" height="320" fill="url(#scan)"/>

  <g opacity="0.18" filter="url(#glow)">
    <circle cx="150" cy="82" r="130" fill="url(#accent)"/>
    <circle cx="1045" cy="250" r="200" fill="url(#accent)"/>
  </g>

  <path d="M0,245 C165,188 315,310 505,252 C690,195 780,106 965,150 C1095,182 1150,242 1200,210 L1200,320 L0,320 Z" fill="url(#accent)" opacity="0.14"/>
  <rect x="0" y="214" width="1200" height="6" fill="url(#beam)" opacity="0.95"/>

  <!-- circuit traces -->
  <g stroke="#22c55e" stroke-opacity="0.18" stroke-width="2" fill="none">
    <path d="M770 70 H1045 V98"/>
    <path d="M860 130 H980 V112"/>
    <path d="M160 90 H300 V62"/>
    <path d="M230 170 H420 V140"/>
  </g>
  <g fill="#06b6d4" opacity="0.22">
    <circle cx="1045" cy="98" r="4"/>
    <circle cx="980" cy="112" r="4"/>
    <circle cx="300" cy="62" r="4"/>
    <circle cx="420" cy="140" r="4"/>
  </g>

  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" fill="#e6fff0">
    <text x="64" y="116" font-size="46" font-weight="850" filter="url(#glow)">Suryansh Verma</text>
    <text x="64" y="154" font-size="18" opacity="0.92">Backend • Cloud/DevOps • System Design</text>
    <text x="64" y="182" font-size="16" opacity="0.78">AWS • Docker • Kubernetes • Node.js • Golang • C++</text>

    <text x="64" y="208" font-size="12" opacity="0.60" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace">$ designing distributed systems</text>

    <g>
      <rect x="64" y="224" rx="14" ry="14" width="332" height="46" fill="#07121c" stroke="url(#accent)" stroke-opacity="0.55"/>
      <text x="86" y="253" font-size="14" opacity="0.95">Building scalable, cloud-native systems</text>

      <rect x="410" y="224" rx="14" ry="14" width="272" height="46" fill="#07121c" stroke="url(#accent)" stroke-opacity="0.55"/>
      <text x="432" y="253" font-size="14" opacity="0.95">Open to collaboration</text>
    </g>
  </g>
</svg>
